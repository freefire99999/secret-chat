<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StudentBook - Social Network</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fbBg: '#18191A', fbCard: '#242526', fbHover: '#3A3B3C', fbPrimary: '#2D88FF',
                        fbText: '#E4E6EB', fbMuted: '#B0B3B8', bgMain: '#111111', sidebar: '#1A1A1A',
                        chatBg: '#0A0A0A', borderDark: '#2D2D2D'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #18191A; color: #E4E6EB; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; touch-action: none; overscroll-behavior-y: none; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3A3B3C; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2D88FF; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }

        /* Chat Bubbles (Prevent selection on mobile for long press) */
        .msg-bubble { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 1rem; word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.2); user-select: none; -webkit-user-select: none; transition: transform 0.2s; }
        .msg-bubble:active { transform: scale(0.98); }
        .msg-sent { background: #2D88FF; color: white; border-bottom-right-radius: 4px; }
        .msg-received { background: #3A3B3C; color: #E4E6EB; border-bottom-left-radius: 4px; }
        
        .story-card { min-width: 120px; height: 200px; border-radius: 15px; background-size: cover; background-position: center; position: relative; overflow: hidden; cursor: pointer; border: 1px solid #3A3B3C; }
        .story-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.8)); }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col text-base md:text-lg">

    <!-- 1. LOGIN SCREEN -->
    <div id="login-section" class="fixed inset-0 z-50 flex items-center justify-center bg-fbBg">
        <div class="bg-fbCard border border-fbHover p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full mx-4 fade-in">
            <div class="w-24 h-24 bg-fbPrimary/20 text-fbPrimary rounded-full flex items-center justify-center text-5xl mx-auto mb-6 shadow-lg">
                <i class="fa-brands fa-facebook"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">StudentBook</h1>
            <p class="text-fbMuted mb-8 text-base">Connect with your friends.</p>
            <button id="btn-login" class="w-full bg-fbPrimary hover:bg-blue-600 text-white font-bold py-4 px-4 rounded-xl transition-all flex items-center justify-center gap-3 shadow-lg text-lg">
                <i class="fa-brands fa-google text-xl"></i> Continue with Google
            </button>
        </div>
    </div>

    <!-- 2. MAIN SOCIAL APP LAYOUT -->
    <div id="social-layout" class="hidden h-full w-full flex flex-col relative overflow-hidden">
        
        <!-- Top Header -->
        <header class="flex justify-between items-center px-4 py-3 bg-fbCard shadow-sm z-20 pt-safe shrink-0">
            <h1 class="text-3xl font-bold text-fbPrimary tracking-tight">StudentBook</h1>
            <div class="flex gap-3 items-center">
                <button onclick="openPostCreator('text')" class="w-11 h-11 rounded-full bg-fbHover flex items-center justify-center text-fbText text-xl"><i class="fa-solid fa-plus"></i></button>
                <img id="top-profile-pic" onclick="document.getElementById('profile-modal').classList.remove('hidden')" src="https://i.pravatar.cc/150" class="w-11 h-11 rounded-full object-cover cursor-pointer border-2 border-fbHover">
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="flex justify-between px-2 border-b border-fbHover bg-fbCard shrink-0">
            <button onclick="switchTab('home')" id="tab-home" class="flex-1 py-3.5 text-fbPrimary border-b-2 border-fbPrimary transition-all"><i class="fa-solid fa-home text-2xl"></i></button>
            <button onclick="switchTab('friends')" id="tab-friends" class="flex-1 py-3.5 text-fbMuted hover:bg-fbHover rounded-lg transition-all relative">
                <i class="fa-solid fa-user-friends text-2xl"></i>
                <span id="req-badge" class="hidden absolute top-1 right-4 bg-red-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full">1</span>
            </button>
            <button onclick="switchTab('watch')" id="tab-watch" class="flex-1 py-3.5 text-fbMuted hover:bg-fbHover rounded-lg transition-all"><i class="fa-brands fa-youtube text-2xl"></i></button>
            <button onclick="switchTab('notifications')" id="tab-notifications" class="flex-1 py-3.5 text-fbMuted hover:bg-fbHover rounded-lg transition-all relative">
                <i class="fa-solid fa-bell text-2xl"></i>
                <span id="notif-badge" class="hidden absolute top-1 right-4 bg-red-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full">1</span>
            </button>
            <button onclick="toggleMessenger()" class="flex-1 py-3.5 text-fbMuted hover:bg-fbHover rounded-lg transition-all"><i class="fa-brands fa-facebook-messenger text-2xl"></i></button>
        </nav>

        <!-- Scrollable Feed Area -->
        <main class="flex-1 overflow-y-auto custom-scroll bg-fbBg pb-safe relative">
            
            <!-- HOME TAB -->
            <div id="view-home" class="block">
                <div class="bg-fbCard p-4 mb-2 shadow-sm">
                    <div class="flex gap-3 items-center border-b border-fbHover pb-4">
                        <img id="feed-my-avatar" src="" class="w-12 h-12 rounded-full object-cover cursor-pointer" onclick="openUserProfile(auth.currentUser.uid)">
                        <div onclick="openPostCreator('text')" class="flex-1 bg-fbHover rounded-full px-5 py-3 text-fbMuted text-lg cursor-pointer">
                            What's on your mind?
                        </div>
                    </div>
                    <div class="flex justify-between pt-3 px-2">
                        <button onclick="triggerMediaUpload('video')" class="flex items-center gap-2 text-fbMuted hover:bg-fbHover px-4 py-2 rounded-lg"><i class="fa-solid fa-video text-red-500 text-xl"></i> <span class="text-base font-medium">Video</span></button>
                        <button onclick="triggerMediaUpload('image')" class="flex items-center gap-2 text-fbMuted hover:bg-fbHover px-4 py-2 rounded-lg"><i class="fa-solid fa-images text-green-500 text-xl"></i> <span class="text-base font-medium">Photo</span></button>
                    </div>
                </div>

                <div class="bg-fbCard p-4 mb-2 shadow-sm">
                    <div id="stories-container" class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                        <div onclick="triggerMediaUpload('story')" class="story-card bg-fbHover flex flex-col items-center justify-end pb-3 shrink-0 group">
                            <img id="story-my-avatar" src="" class="absolute top-0 left-0 w-full h-3/4 object-cover">
                            <div class="w-10 h-10 bg-fbPrimary rounded-full flex items-center justify-center text-white border-4 border-fbCard absolute bottom-7 z-10"><i class="fa-solid fa-plus text-lg"></i></div>
                            <span class="text-sm font-bold mt-5 z-10">Create Story</span>
                        </div>
                    </div>
                </div>

                <div id="feed-container" class="space-y-2 pb-6">
                    <div class="text-center text-fbMuted py-10"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-2 text-fbPrimary"></i><br>Loading Feed...</div>
                </div>
            </div>

            <!-- WATCH TAB -->
            <div id="view-watch" class="hidden">
                <div class="bg-fbCard p-4 mb-2 shadow-sm flex justify-between items-center">
                    <h2 class="text-2xl font-bold">Watch</h2>
                </div>
                <div id="watch-container" class="space-y-2 pb-6"></div>
            </div>

            <!-- NOTIFICATIONS TAB -->
            <div id="view-notifications" class="hidden">
                <div class="bg-fbCard p-4 mb-2 shadow-sm">
                    <h2 class="text-2xl font-bold mb-4">Notifications</h2>
                    <div id="notifications-container" class="space-y-1"></div>
                </div>
            </div>

            <!-- FRIENDS TAB -->
            <div id="view-friends" class="hidden">
                <div class="bg-fbCard p-4 mb-2 shadow-sm">
                    <h2 class="text-xl font-bold mb-4 text-fbPrimary">Friend Requests</h2>
                    <div id="friend-requests-container" class="space-y-3 mb-6"></div>
                    
                    <h2 class="text-xl font-bold mb-4 border-t border-fbHover pt-4 text-fbPrimary">My Friends</h2>
                    <div id="my-friends-container" class="space-y-3 mb-6"></div>

                    <h2 class="text-xl font-bold mb-4 border-t border-fbHover pt-4 text-fbPrimary">Add Friends</h2>
                    <div id="find-friends-container" class="space-y-3 pb-6"></div>
                </div>
            </div>

            <!-- USER PROFILE TAB (NEW) -->
            <div id="view-profile" class="hidden">
                <div class="bg-fbCard mb-2 shadow-sm relative">
                    <!-- Back Button -->
                    <button onclick="switchTab('home')" class="absolute top-4 left-4 z-10 w-10 h-10 bg-black/50 rounded-full flex items-center justify-center text-white"><i class="fa-solid fa-arrow-left"></i></button>
                    <!-- Cover Photo -->
                    <div class="w-full h-48 bg-fbHover bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                    <!-- Profile Info -->
                    <div class="px-4 pb-4 relative -mt-16 text-center">
                        <img id="profile-page-avatar" src="" class="w-32 h-32 rounded-full border-4 border-fbCard object-cover mx-auto bg-fbCard">
                        <h2 id="profile-page-name" class="text-3xl font-bold mt-2">Loading...</h2>
                        <p class="text-fbMuted mb-4">StudentBook User</p>
                        <div id="profile-page-actions" class="flex justify-center gap-3"></div>
                    </div>
                </div>
                <div class="bg-fbCard p-4 mb-2 shadow-sm">
                    <h3 class="font-bold text-lg border-b border-fbHover pb-2 mb-2">Posts</h3>
                    <div id="profile-feed-container" class="space-y-2">
                        <!-- User's posts will load here -->
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- 3. FULL SCREEN STORY VIEWER -->
    <div id="story-viewer" class="hidden fixed inset-0 z-[70] bg-black flex flex-col">
        <div class="flex justify-between p-4 absolute top-0 w-full z-10 bg-gradient-to-b from-black/80 to-transparent pt-safe">
            <div class="flex items-center gap-3 cursor-pointer" id="sv-user-trigger">
                <img id="sv-avatar" class="w-12 h-12 rounded-full border-2 border-fbPrimary object-cover">
                <div>
                    <span id="sv-name" class="text-white font-bold text-lg block"></span>
                </div>
            </div>
            <button onclick="closeStory()" class="text-white text-3xl w-10 h-10 flex items-center justify-center bg-black/30 rounded-full"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="flex-1 flex items-center justify-center relative bg-black">
            <div id="sv-media-container" class="w-full h-full flex items-center justify-center"></div>
        </div>
        <div class="p-6 absolute bottom-0 w-full bg-gradient-to-t from-black/90 to-transparent flex justify-between items-center pb-safe">
            <button id="sv-like-btn" class="text-white text-4xl ml-4 hover:text-red-500 transition-colors drop-shadow-lg mx-auto"><i class="fa-regular fa-heart"></i></button>
        </div>
    </div>

    <!-- 4. POST CREATOR MODAL -->
    <div id="post-creator-modal" class="hidden fixed inset-0 z-[80] bg-fbCard flex flex-col slide-up">
        <div class="flex justify-between items-center p-4 border-b border-fbHover pt-safe">
            <button onclick="closePostCreator()" class="text-fbText text-2xl w-10 h-10 flex items-center justify-center rounded-full hover:bg-fbHover"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="text-xl font-bold">Create Post</h2>
            <button id="btn-publish-post" class="bg-fbPrimary text-white px-5 py-2 rounded-lg font-bold disabled:opacity-50">POST</button>
        </div>
        <div class="flex-1 p-4 overflow-y-auto">
            <textarea id="pc-text" placeholder="What's on your mind?" class="w-full bg-transparent text-white text-2xl focus:outline-none resize-none h-32"></textarea>
            <div id="pc-media-preview" class="hidden relative mt-4 rounded-xl overflow-hidden border border-fbHover bg-black">
                <button onclick="removeMediaPreview()" class="absolute top-2 right-2 bg-black/60 text-white w-8 h-8 rounded-full z-10"><i class="fa-solid fa-times"></i></button>
                <div id="pc-media-content" class="flex justify-center"></div>
            </div>
        </div>
    </div>

    <!-- 5. LIKES MODAL -->
    <div id="likes-modal" class="hidden fixed inset-0 z-[90] bg-black/80 flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-fbCard w-full max-w-sm rounded-2xl flex flex-col max-h-[70vh] slide-up shadow-2xl">
            <div class="p-4 border-b border-fbHover flex justify-between items-center">
                <h2 class="text-xl font-bold"><i class="fa-solid fa-thumbs-up text-fbPrimary mr-2"></i> People who liked</h2>
                <button onclick="document.getElementById('likes-modal').classList.add('hidden')" class="w-8 h-8 bg-fbHover rounded-full text-fbText"><i class="fa-solid fa-times"></i></button>
            </div>
            <div id="likes-list" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
        </div>
    </div>

    <!-- 6. COMMENTS BOTTOM SHEET -->
    <div id="comments-modal" class="hidden fixed inset-0 z-[85] bg-black/70 flex flex-col justify-end">
        <div class="bg-fbCard w-full h-[75vh] rounded-t-3xl flex flex-col slide-up shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
            <div class="flex justify-between items-center p-4 border-b border-fbHover">
                <h2 class="text-xl font-bold">Comments</h2>
                <button onclick="document.getElementById('comments-modal').classList.add('hidden')" class="bg-fbHover w-8 h-8 rounded-full text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            <div id="comments-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <div class="p-4 border-t border-fbHover pb-safe flex gap-2 items-center">
                <input type="text" id="comment-input" placeholder="Write a comment..." class="flex-1 bg-fbHover rounded-full px-5 py-3 text-white focus:outline-none">
                <button id="btn-send-comment" class="w-12 h-12 bg-fbPrimary rounded-full text-white flex items-center justify-center text-lg shrink-0"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- 7. FULL SCREEN MESSENGER (With Edit/Delete Support) -->
    <div id="messenger-overlay" class="hidden fixed inset-0 z-[100] bg-bgMain flex overflow-hidden transition-transform transform translate-y-full duration-300">
        <!-- Chat List -->
        <div id="chat-sidebar" class="w-full h-full flex flex-col absolute inset-0 transition-transform duration-300 bg-sidebar">
            <div class="p-4 pt-safe flex items-center gap-4 border-b border-borderDark shrink-0">
                <button onclick="toggleMessenger()" class="text-fbText text-2xl w-10 h-10 flex items-center justify-center rounded-full hover:bg-borderDark"><i class="fa-solid fa-arrow-down"></i></button>
                <h2 class="text-2xl font-bold">Chats</h2>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll p-2 space-y-1 pb-safe" id="messenger-friends-list"></div>
        </div>

        <!-- Chat Room -->
        <div id="chat-area" class="w-full h-full flex flex-col absolute inset-0 bg-chatBg transform translate-x-full transition-transform duration-300 z-50">
            <header class="h-[75px] bg-sidebar border-b border-borderDark flex items-center px-4 shrink-0 pt-safe">
                <button id="btn-back-chat" class="text-fbPrimary text-2xl mr-4 w-10 h-10 flex items-center justify-center rounded-full hover:bg-borderDark"><i class="fa-solid fa-arrow-left"></i></button>
                <img id="chat-user-avatar" src="" class="w-12 h-12 rounded-full object-cover border border-borderDark mr-3 cursor-pointer" onclick="openUserProfileFromChat()">
                <div>
                    <h3 id="chat-user-name" class="font-bold text-white text-lg">Name</h3>
                    <p class="text-sm text-fbMuted">Active now</p>
                </div>
            </header>
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar flex flex-col pb-6"></div>
            <footer class="p-3 bg-sidebar border-t border-borderDark shrink-0 pb-safe">
                <form id="msg-form" class="flex items-end gap-2">
                    <button type="button" onclick="triggerMediaUpload('chat')" class="w-12 h-12 rounded-full text-fbPrimary flex items-center justify-center text-2xl hover:bg-borderDark transition-colors shrink-0"><i class="fa-solid fa-image"></i></button>
                    <input type="text" id="msg-input" placeholder="Message..." class="flex-1 bg-bgMain border border-borderDark rounded-full px-5 py-3.5 text-white focus:outline-none text-base" autocomplete="off">
                    <button type="submit" class="w-12 h-12 rounded-full bg-fbPrimary text-white flex items-center justify-center text-xl shrink-0"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </footer>
        </div>
    </div>

    <!-- 8. PROFILE SETTINGS MODAL (With direct upload button) -->
    <div id="profile-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="bg-fbCard border border-fbHover rounded-2xl w-full max-w-md p-6 shadow-2xl relative fade-in mx-4">
            <button onclick="document.getElementById('profile-modal').classList.add('hidden')" class="absolute top-4 right-4 text-fbMuted bg-fbHover w-10 h-10 rounded-full text-xl"><i class="fa-solid fa-times"></i></button>
            <h2 class="text-2xl font-bold mb-6 text-white border-b border-fbHover pb-2">Profile Settings</h2>
            
            <div class="flex flex-col items-center mb-6 relative">
                <img id="edit-photo-preview" src="" class="w-24 h-24 rounded-full object-cover border-4 border-fbHover">
                <button onclick="triggerMediaUpload('profile')" class="absolute bottom-0 right-1/3 bg-fbPrimary w-8 h-8 rounded-full text-white shadow-lg"><i class="fa-solid fa-camera"></i></button>
            </div>

            <div class="space-y-4">
                <div><label class="block text-sm text-fbMuted mb-1">Name</label><input type="text" id="edit-name" class="w-full bg-fbBg border border-fbHover rounded-xl px-4 py-3 text-white"></div>
                <button id="btn-save-profile" class="w-full bg-fbPrimary text-white font-bold py-4 rounded-xl mt-2 text-lg">Save Changes</button>
                <button id="btn-logout" class="w-full bg-fbHover text-red-500 font-bold py-4 rounded-xl mt-2 text-lg">Log Out</button>
            </div>
        </div>
    </div>

    <!-- HIDDEN INPUT FOR MEDIA UPLOAD -->
    <input type="file" id="hidden-media-input" accept="image/*,video/*" class="hidden">

    <!-- ========================================== -->
    <!-- FIREBASE & LOGIC -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, onSnapshot, query, where, orderBy, serverTimestamp, addDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAFaftE9eZ10nDuN5Dw3BP4XekOPO61KxI", authDomain: "private-chat-d4a25.firebaseapp.com",
            projectId: "private-chat-d4a25", storageBucket: "private-chat-d4a25.firebasestorage.app",
            messagingSenderId: "648917471445", appId: "1:648917471445:web:8e1c49a480f27731ca525c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUserData = null;
        let usersCache = {}; 
        let currentChatUserId = null;
        let activeChatUnsubscribe = null;
        let pendingMediaFile = null;
        let pendingMediaType = null;
        let currentPostIdForComment = null;

        const CLOUD_NAME = 'dnojfkqjr'; const UPLOAD_PRESET = 'imranafridi99';
        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, background: '#242526', color: '#fff' });

        // GLOBAL VIDEO AUTO-PAUSE LOGIC
        document.addEventListener('play', function(e){
            const videos = document.getElementsByTagName('video');
            for(let i = 0; i < videos.length; i++){
                if(videos[i] !== e.target) videos[i].pause();
            }
        }, true);

        // 1. AUTHENTICATION
        document.getElementById('btn-login').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    currentUserData = { uid: user.uid, name: user.displayName, photoUrl: user.photoURL, friends:[], friendRequests: [], blocked:[], createdAt: serverTimestamp() };
                    await setDoc(userRef, currentUserData);
                } else {
                    currentUserData = userSnap.data();
                    if(!currentUserData.friends) currentUserData.friends =[];
                    if(!currentUserData.friendRequests) currentUserData.friendRequests =[];
                    if(!currentUserData.blocked) currentUserData.blocked =[];
                }
                usersCache[user.uid] = currentUserData; // Store self in cache

                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('social-layout').classList.remove('hidden');
                
                updateMyProfileUI();
                initUsersListener();
                initFeedListener();
                initStoriesListener();
                initNotificationsListener();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('social-layout').classList.add('hidden');
            }
        });

        function updateMyProfileUI() {
            const photo = currentUserData.photoUrl;
            document.getElementById('top-profile-pic').src = photo;
            document.getElementById('feed-my-avatar').src = photo;
            document.getElementById('story-my-avatar').src = photo;
            document.getElementById('edit-name').value = currentUserData.name;
            document.getElementById('edit-photo-preview').src = photo;
        }

        document.getElementById('btn-save-profile').addEventListener('click', async () => {
            const updates = { name: document.getElementById('edit-name').value };
            await updateDoc(doc(db, "users", auth.currentUser.uid), updates);
            currentUserData = { ...currentUserData, ...updates };
            usersCache[auth.currentUser.uid] = currentUserData;
            updateMyProfileUI();
            document.getElementById('profile-modal').classList.add('hidden');
            Toast.fire({icon: 'success', title: 'Saved'});

        // 3. ADVANCED FRIEND SYSTEM
        function initUsersListener() {
            onSnapshot(doc(db, "users", auth.currentUser.uid), (docSnap) => {
                if(docSnap.exists()) {
                    currentUserData = docSnap.data();
                    if(!currentUserData.friends) currentUserData.friends =[];

                    if(!currentUserData.blocked) currentUserData.blocked =[];

                    const badge = document.getElementById('req-badge');
                    if(currentUserData.friendRequests.length > 0) { badge.innerText = currentUserData.friendRequests.length; badge.classList.remove('hidden'); }

                    renderUsersList();
                }
            });
            onSnapshot(collection(db, "users"), (snap) => {
                snap.forEach(d => { usersCache[d.id] = d.data(); });
                renderUsersList();
            });

        function renderUsersList() {
            let reqHtml = ''; let myFriendsHtml = ''; let findHtml = ''; let messengerHtml = '';

            Object.keys(usersCache).forEach(uid => {
                if(uid === auth.currentUser.uid) return;
                const u = usersCache[uid];
                if(currentUserData.blocked.includes(uid)) return;

                const isFriend = currentUserData.friends.includes(uid);
                const hasReceivedReq = currentUserData.friendRequests.includes(uid);
                const hasSentReq = u.friendRequests && u.friendRequests.includes(auth.currentUser.uid);

                const userCard = `
                    <div class="flex items-center gap-3 p-3 bg-fbCard rounded-xl border border-fbHover">
                        <img src="${u.photoUrl}" class="w-16 h-16 rounded-full object-cover cursor-pointer" onclick="openUserProfile('${uid}')">
                        <div class="flex-1">
                            <h4 class="font-bold text-lg cursor-pointer" onclick="openUserProfile('${uid}')">${u.name}</h4>
                            <div class="flex gap-2 mt-2">
                                ${isFriend ? 
                                    `<button onclick="window.openChat('${uid}', '${u.name.replace(/'/g, "\\'")}', '${u.photoUrl}')" class="flex-1 bg-fbPrimary text-white py-2 rounded-lg font-semibold"><i class="fa-brands fa-facebook-messenger"></i> Message</button>
                                     <button onclick="unfriendUser('${uid}')" class="bg-fbHover text-fbText px-3 py-2 rounded-lg"><i class="fa-solid fa-user-minus"></i></button>
                                     <button onclick="blockUser('${uid}')" class="bg-red-500/20 text-red-500 px-3 py-2 rounded-lg"><i class="fa-solid fa-ban"></i></button>` : 
                                 hasReceivedReq ? 
                                    `<button onclick="acceptFriend('${uid}')" class="flex-1 bg-fbPrimary text-white py-2 rounded-lg font-semibold">Accept</button>
                                     <button onclick="rejectFriend('${uid}')" class="flex-1 bg-fbHover text-fbText py-2 rounded-lg font-semibold">Reject</button>` :
                                 hasSentReq ? 
                                    `<button class="flex-1 bg-fbHover py-2 rounded-lg font-semibold text-fbMuted" disabled>Requested</button>` :
                                    `<button onclick="addFriend('${uid}')" class="flex-1 bg-fbPrimary text-white py-2 rounded-lg font-semibold"><i class="fa-solid fa-user-plus"></i> Add</button>`
                                }
                            </div>
                        </div>
                    </div>
                `;

                if(hasReceivedReq) reqHtml += userCard;
                else if(isFriend) myFriendsHtml += userCard;
                else if(!hasSentReq) findHtml += userCard;

                if(isFriend) {
                    messengerHtml += `
                        <div onclick="window.openChat('${uid}', '${u.name.replace(/'/g, "\\'")}', '${u.photoUrl}')" class="flex items-center gap-4 p-3 rounded-xl hover:bg-borderDark cursor-pointer transition-colors">

            document.getElementById('find-friends-container').innerHTML = findHtml || '<p class="text-fbMuted">No more users found.</p>';
            document.getElementById('messenger-friends-list').innerHTML = messengerHtml || '<div class="text-center text-fbMuted mt-10">Add friends to chat!</div>';
        }

        // 4. GLOBAL MEDIA UPLOAD (Profile Pic + Posts + Stories + Chat)
        window.triggerMediaUpload = function(target) {
            document.getElementById('hidden-media-input').setAttribute('data-target', target);
            // reset file input
            document.getElementById('hidden-media-input').value = ''; 
            document.getElementById('hidden-media-input').click();
        };

        document.getElementById('hidden-media-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const target = this.getAttribute('data-target');
            pendingMediaType = file.type.startsWith('video/') ? 'video' : 'image';
            pendingMediaFile = file;
            const localUrl = URL.createObjectURL(file);

            if(target === 'profile') {
                if(pendingMediaType !== 'image') return Toast.fire({ icon: 'error', title: 'Profile must be an image.' });
                Swal.fire({ title: 'Updating Profile...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#242526', color: '#fff' });
                try {
                    const url = await uploadToCloudinary(file);
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { photoUrl: url });
                    currentUserData.photoUrl = url;
                    usersCache[auth.currentUser.uid] = currentUserData;
                    updateMyProfileUI();
                    Swal.close(); Toast.fire({ icon: 'success', title: 'Profile Updated!' });
                } catch(err) { Swal.close(); Toast.fire({ icon: 'error', title: 'Upload Failed' }); }
            } else if(target === 'story') {
                uploadAndSaveStory(file, pendingMediaType);
            } else if (target === 'chat') {
                if(!currentChatUserId) return;
                const myId = auth.currentUser.uid;
                const chatId = myId < currentChatUserId ? `${myId}_${currentChatUserId}` : `${currentChatUserId}_${myId}`;
                
                const docRef = await addDoc(collection(db, "messages"), {
                    chatId: chatId, senderId: myId, text: "", localUrl: localUrl, mediaType: pendingMediaType, isUploading: true, timestamp: serverTimestamp()
                });
                try {
                    const url = await uploadToCloudinary(file);
                    await updateDoc(doc(db, "messages", docRef.id), { mediaUrl: url, isUploading: false, localUrl: null });
                } catch (err) {
                    await deleteDoc(doc(db, "messages", docRef.id));
                    Toast.fire({ icon: 'error', title: 'Upload failed' });
                }
            } else {
                document.getElementById('post-creator-modal').classList.remove('hidden');
                document.getElementById('pc-media-preview').classList.remove('hidden');
                const contentDiv = document.getElementById('pc-media-content');
                if(pendingMediaType === 'video') contentDiv.innerHTML = `<video src="${localUrl}" controls class="max-h-[300px]"></video>`;
                else contentDiv.innerHTML = `<img src="${localUrl}" class="max-h-[300px] object-contain">`;
            }
            this.value = '';
        });

        window.openPostCreator = function(type) {

        async function uploadAndSaveStory(file, type) {
            Swal.fire({ title: 'Uploading Story...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#242526', color: '#fff' });
            try {
                const url = await uploadToCloudinary(file);
                await addDoc(collection(db, "stories"), {
                    userId: auth.currentUser.uid, mediaUrl: url, mediaType: type, likes:[], timestamp: serverTimestamp()
                });
                Swal.close(); Toast.fire({ icon: 'success', title: 'Story Added!' });
            } catch(e) { Swal.close(); Toast.fire({ icon: 'error', title: 'Failed' }); }
        }

        async function uploadToCloudinary(file) {
            return new Promise((resolve, reject) => {
                const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', UPLOAD_PRESET);
                const xhr = new XMLHttpRequest(); xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);
                xhr.onload = () => { if (xhr.status === 200) resolve(JSON.parse(xhr.responseText).secure_url); else reject(); };
                xhr.onerror = () => reject(); xhr.send(formData);
            });
        }

        // 6. POST RENDERING ENGINE (Used for Feed, Watch, Profile)

                    ${p.text ? `<div class="px-4 pb-2 text-lg whitespace-pre-wrap">${p.text}</div>` : ''}

        let allPostsData =[]; // Store posts locally to filter for profiles
        function initFeedListener() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));

        window.openStory = function(dataStr) {

            document.getElementById('sv-avatar').src = u.photoUrl;
            document.getElementById('sv-name').innerText = u.name;
            document.getElementById('sv-user-trigger').onclick = () => { closeStory(); openUserProfile(s.userId); };

            const container = document.getElementById('sv-media-container');
            if(s.mediaType === 'video') container.innerHTML = `<video src="${s.mediaUrl}" autoplay playsinline controls class="max-w-full max-h-full"></video>`;
            else container.innerHTML = `<img src="${s.mediaUrl}" class="max-w-full max-h-full object-contain">`;
            
            const likeBtn = document.getElementById('sv-like-btn');
            const isLiked = s.likes && s.likes.includes(auth.currentUser.uid);
            likeBtn.innerHTML = isLiked ? '<i class="fa-solid fa-heart text-red-500"></i>' : '<i class="fa-regular fa-heart"></i>';
            likeBtn.onclick = async () => {
                const ref = doc(db, "stories", s.id);
                if(isLiked) { await updateDoc(ref, { likes: arrayRemove(auth.currentUser.uid) }); likeBtn.innerHTML = '<i class="fa-regular fa-heart"></i>'; } 
                else { await updateDoc(ref, { likes: arrayUnion(auth.currentUser.uid) }); likeBtn.innerHTML = '<i class="fa-solid fa-heart text-red-500"></i>'; if(s.userId !== auth.currentUser.uid) sendNotification(s.userId, 'story_like', s.id); }
            };
        };
        window.closeStory = function() { document.getElementById('story-viewer').classList.add('hidden'); document.getElementById('sv-media-container').innerHTML = ''; };

        // 10. NOTIFICATIONS (FIXED FIREBASE INDEX ISSUE VIA LOCAL SORT)
        async function sendNotification(receiverId, type, targetId) {
            await addDoc(collection(db, "notifications"), { receiverId: receiverId, senderId: auth.currentUser.uid, type: type, targetId: targetId, timestamp: serverTimestamp() });
        }
        function initNotificationsListener() {
            // Local sort fixes the "Missing Composite Index" error
            const q = query(collection(db, "notifications"), where("receiverId", "==", auth.currentUser.uid));
            onSnapshot(q, (snapshot) => {
                let notifs =[];
                snapshot.forEach(doc => notifs.push(doc.data()));
                notifs.sort((a, b) => (b.timestamp ? b.timestamp.toMillis() : Date.now()) - (a.timestamp ? a.timestamp.toMillis() : Date.now()));

                let html = ''; let count = 0;
                notifs.forEach(n => {
                    count++; let text = '';
                    const u = usersCache[n.senderId] || { name: 'Someone', photoUrl: 'https://i.pravatar.cc/150' };
                    if(n.type === 'like') text = 'liked your post.';
                    if(n.type === 'comment') text = 'commented on your post.';
                    if(n.type === 'friend_request') text = 'sent you a friend request.';
                    if(n.type === 'story_like') text = 'liked your story.';
                    
                    html += `<div class="flex items-center gap-3 p-4 bg-fbCard border-b border-fbHover cursor-pointer hover:bg-fbHover transition-colors" onclick="openUserProfile('${n.senderId}')"><img src="${u.photoUrl}" class="w-16 h-16 rounded-full object-cover"><p class="text-lg"><span class="font-bold text-white">${u.name}</span> <span class="text-fbMuted">${text}</span></p></div>`;
                });
                document.getElementById('notifications-container').innerHTML = html || '<p class="text-fbMuted p-4">No notifications.</p>';
                const badge = document.getElementById('notif-badge');
                if(count > 0) { badge.innerText = count; badge.classList.remove('hidden'); } else badge.classList.add('hidden');
            });
        }

        // 11. MESSENGER CHAT (With Long Press Edit/Delete)
        let pressTimer; let isPressing = false;
        
        window.startPress = function(e, msgId, msgText, isMe, isUploading) {
            if (!isMe || isUploading) return;
            isPressing = true;
            pressTimer = window.setTimeout(() => { if(isPressing) showMsgOptions(msgId, msgText); }, 600);
        };
        window.cancelPress = function() { isPressing = false; clearTimeout(pressTimer); };

        window.showMsgOptions = function(msgId, currentText) {
            Swal.fire({
                title: 'Message Options', icon: 'question', showDenyButton: true, showCancelButton: true,
                confirmButtonText: '<i class="fa-solid fa-pen"></i> Edit', denyButtonText: '<i class="fa-solid fa-trash"></i> Delete',
                background: '#242526', color: '#fff', confirmButtonColor: '#2D88FF', denyButtonColor: '#ef4444'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const { value: newText } = await Swal.fire({ title: 'Edit Message', input: 'text', inputValue: currentText, showCancelButton: true, background: '#242526', color: '#fff' });
                    if (newText && newText !== currentText) await updateDoc(doc(db, "messages", msgId), { text: newText, isEdited: true });
                } else if (result.isDenied) {
                    await deleteDoc(doc(db, "messages", msgId));
                }
            });
        };

        window.openChat = function(userId, name, photoUrl) {
            currentChatUserId = userId;
            document.getElementById('chat-sidebar').classList.add('-translate-x-full');
            document.getElementById('chat-area').classList.remove('translate-x-full');
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-avatar').src = photoUrl;

            const myId = auth.currentUser.uid;
            const chatId = myId < userId ? `${myId}_${userId}` : `${userId}_${myId}`;

            if (activeChatUnsubscribe) activeChatUnsubscribe();
            const q = query(collection(db, "messages"), where("chatId", "==", chatId));
            
            activeChatUnsubscribe = onSnapshot(q, (snapshot) => {
                let messagesArray =[];
                snapshot.forEach(docSnap => messagesArray.push({ id: docSnap.id, ...docSnap.data() }));
                messagesArray.sort((a, b) => (a.timestamp ? a.timestamp.toMillis() : Date.now()) - (b.timestamp ? b.timestamp.toMillis() : Date.now()));

                let html = '';
                messagesArray.forEach(m => {
                    const isMe = m.senderId === myId;
                    let contentHtml = '';
                    let mediaSrc = m.isUploading && isMe ? m.localUrl : m.mediaUrl;
                    
                    if (mediaSrc || (m.isUploading && !isMe)) {
                        let mediaTag = m.isUploading && !isMe ? `<div class="w-32 h-20 bg-borderDark flex items-center justify-center text-fbMuted rounded-xl"><i class="fa-solid fa-spinner fa-spin"></i></div>` : 
                                     (m.mediaType === 'video' ? `<video src="${mediaSrc}" controls class="max-w-[200px] rounded-xl mb-1"></video>` : 
                                     `<img src="${mediaSrc}" class="max-w-[200px] rounded-xl mb-1 object-cover cursor-pointer" onclick="window.open('${mediaSrc}','_blank')">`);
                        contentHtml += mediaTag;
                    }
                    if (m.text) contentHtml += `<span class="block">${m.text}</span>`;
                    if (m.isEdited) contentHtml += `<span class="text-[10px] text-gray-300 block italic">(edited)</span>`;
                    
                    html += `
                        <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-3">
                            <div class="msg-bubble ${isMe ? 'msg-sent cursor-pointer' : 'msg-received'}"
                                 ${isMe ? `onmousedown="startPress(event, '${m.id}', '${m.text || ''}', true, ${m.isUploading || false})" onmouseup="cancelPress()" onmouseleave="cancelPress()" ontouchstart="startPress(event, '${m.id}', '${m.text || ''}', true, ${m.isUploading || false})" ontouchend="cancelPress()" ontouchcancel="cancelPress()"` : ''}>
                                ${contentHtml}
                            </div>
                        </div>
                    `;
                });
                const container = document.getElementById('messages-container');
                container.innerHTML = html;
                setTimeout(() => container.scrollTop = container.scrollHeight, 100);
            });
        };

        document.getElementById('btn-back-chat').addEventListener('click', () => {
            document.getElementById('chat-sidebar').classList.remove('-translate-x-full');
            document.getElementById('chat-area').classList.add('translate-x-full');
            currentChatUserId = null;
        });

        document.getElementById('msg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentChatUserId) return;
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            input.focus(); // Keep keyboard open

            const myId = auth.currentUser.uid;
            const chatId = myId < currentChatUserId ? `${myId}_${currentChatUserId}` : `${currentChatUserId}_${myId}`;
            await addDoc(collection(db, "messages"), { chatId: chatId, senderId: myId, text: text, timestamp: serverTimestamp() });
        });

    </script>
</body>
</html>
